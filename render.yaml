services:
  - type: web
    name: medvoiceai
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_FORMSPREE_ENDPOINT
        sync: false
      - key: VITE_RETELL_API_BASE_URL
        sync: false
